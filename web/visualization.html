<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>d2m - SubCAD Visualization</title>
  <link rel="stylesheet" href="style.css?v=20260520-slot-cache">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="session-viewer.js?v=20260520-slot-cache"></script>
</head>
<body>
<div class="app-container">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>d2m</h1>
      <div class="subtitle">SubCAD Visualization</div>
    </div>
    <div class="sidebar-content">
      <div class="section">
        <div class="section-header">Session</div>
        <div class="section-body">
          <div class="setting-row vertical">
            <label for="session-path">scene.json</label>
            <input id="session-path" type="text" value="sessions/latest/scene.json">
          </div>
          <button class="btn btn-primary full-width" id="load-session">Load Session</button>
          <div class="status" id="status">Ready</div>
        </div>
      </div>

      <div class="section">
        <div class="section-header">Operation Timeline</div>
        <div class="section-body">
          <div class="timeline-controls">
            <button class="btn btn-sm" id="timeline-prev" type="button">Prev</button>
            <div class="timeline-label" id="timeline-label">No timeline loaded</div>
            <button class="btn btn-sm" id="timeline-next" type="button">Next</button>
          </div>
          <input id="timeline-range" class="timeline-range" type="range" min="0" max="0" step="1" value="0">
        </div>
      </div>

      <div class="section">
        <div class="section-header">Playback</div>
        <div class="section-body">
          <div class="playback-controls">
            <button class="btn btn-primary" id="playback-play" type="button">Play</button>
            <button class="btn" id="playback-reset" type="button">Reset</button>
            <select id="playback-speed" aria-label="Playback speed">
              <option value="1">1x</option>
              <option value="5">5x</option>
              <option value="10" selected>10x</option>
              <option value="25">25x</option>
              <option value="50">50x</option>
            </select>
          </div>
          <input id="playback-range" class="timeline-range" type="range" min="0" max="1000" step="1" value="0">
          <div class="playback-label" id="playback-label">No toolpath loaded</div>
        </div>
      </div>

      <div class="section">
        <div class="section-header">View Options</div>
        <div class="section-body">
          <label class="check-row"><input type="checkbox" id="show-stock" checked> Stock material</label>
          <label class="check-row"><input type="checkbox" id="show-target" checked> Target overlay</label>
          <label class="check-row"><input type="checkbox" id="show-toolpath" checked> Toolpath</label>
          <label class="check-row"><input type="checkbox" id="show-tool" checked> Tool</label>
          <label class="check-row"><input type="checkbox" id="show-diff" checked> Diff markers</label>
          <button class="btn full-width" id="fit-view">Fit View</button>
          <div class="toolpath-legend" aria-label="Toolpath move legend">
            <div><span class="legend-swatch rapid"></span>Rapid</div>
            <div><span class="legend-swatch feed"></span>Feed cut</div>
            <div><span class="legend-swatch plunge"></span>Plunge</div>
            <div><span class="legend-swatch retract"></span>Retract</div>
            <div><span class="legend-swatch arc"></span>Arc</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-header">Metadata</div>
        <div class="section-body" id="metadata">
          <div class="meta-row"><span>Status</span><strong>Not loaded</strong></div>
        </div>
      </div>

      <div class="section">
        <div class="section-header">Operations</div>
        <div class="section-body">
          <div class="op-list" id="operations">
            <div class="op-item pending">No session loaded.</div>
          </div>
        </div>
      </div>
    </div>
  </aside>

  <main class="viewport" id="viewport">
    <div class="camera-controls">
      <button class="cam-btn" onclick="document.getElementById('fit-view').click()" title="Fit">Fit</button>
    </div>
  </main>
</div>
</body>
</html>
